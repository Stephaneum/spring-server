services:
  db:
    image: mysql:8.4.10
    container_name: stephaneum-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: foradmin
      MYSQL_DATABASE: s4
    ports:
      - "3306:3306"
    volumes:
      - stephaneum-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pforadmin"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stephaneum-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9050:9050"   # HTTP
      - "5005:5005"   # remote JVM debug
    environment:
      # Override the hardcoded localhost datasource -> point at the db service
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/s4?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: foradmin

volumes:
  stephaneum-db-data: